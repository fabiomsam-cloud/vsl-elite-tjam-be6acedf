<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Espere! Sua matrícula ainda não está completa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .video-wrapper {
      width: 100%;
    }

    .botoes {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .6s ease, transform .6s ease;
    }

    .botoes.visivel {
      display: flex;
    }

    .botoes.animar {
      opacity: 1;
      transform: translateY(0);
    }

    .btn-sim {
      display: block;
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, #22c55e 0%, #15803d 100%);
      color: #ffffff;
      text-decoration: none;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .5px;
      padding: 22px 28px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(34, 197, 94, .35);
      animation: pulsar 1.8s ease-in-out infinite;
    }

    .btn-sim:hover {
      filter: brightness(1.08);
    }

    @keyframes pulsar {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .btn-nao {
      color: #6b7280;
      text-decoration: underline;
      font-size: 15px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-nao:hover {
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .btn-sim { font-size: 18px; padding: 18px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-wrapper">
      <!-- ▼▼▼ COLE AQUI O CÓDIGO DO PLAYER VTURB (substitua este bloco placeholder inteiro) ▼▼▼ -->
      <div id="placeholder-vturb" style="position: relative; width: 100%; padding: 56.25% 0 0; background-color: #000; border-radius: 12px; overflow: hidden;">
        <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #4b5563; font-size: 15px; letter-spacing: 1px;">VÍDEO — AGUARDANDO CÓDIGO VTURB</div>
      </div>
      <!-- ▲▲▲ FIM DO BLOCO DO VTURB ▲▲▲ -->
    </div>

    <div class="botoes" id="botoes">
      <a class="btn-sim" href="https://pay.hub.la/UlyATz5JUD63RHYRIi2H" id="btn-sim">SIM, QUERO A PÓS-GRADUAÇÃO</a>
      <a class="btn-nao" href="https://www.scvpmentorias10x.com.br/compra-confirmada" id="btn-nao">Não tenho interesse</a>
    </div>
  </div>

  <script>
    // Momento do VÍDEO (não da página) em que os botões aparecem.
    // Ajustar quando o vídeo do Vturb for definido.
    var SEGUNDOS_DO_VIDEO = 258;

    var jaExibiu = false;
    var tentativas = 0;

    function exibirBotoes() {
      if (jaExibiu) return;
      jaExibiu = true;
      var botoes = document.getElementById("botoes");
      botoes.classList.add("visivel");
      setTimeout(function () {
        botoes.classList.add("animar");
      }, 50);
    }

    function vigiarProgressoDoVideo() {
      if (typeof smartplayer === "undefined" || !(smartplayer.instances && smartplayer.instances.length)) {
        // Player ainda não carregou; tenta por até 30s. Sem player (ex.: código
        // do Vturb ainda não colado), libera os botões para a página não ficar quebrada.
        if (tentativas >= 30) return exibirBotoes();
        tentativas += 1;
        return setTimeout(vigiarProgressoDoVideo, 1000);
      }
      var player = smartplayer.instances[0];
      player.on("timeupdate", function () {
        if (jaExibiu) return;
        // No smart autoplay o vídeo roda mudo antes do clique; só conta após o play real.
        if (player.smartAutoPlay && player.analytics && !player.analytics.hasStarted) return;
        if (player.video.currentTime < SEGUNDOS_DO_VIDEO) return;
        exibirBotoes();
      });
    }

    vigiarProgressoDoVideo();
  </script>
</body>
</html>
